<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    {% include head.html %}
    
    <!-- Breadcrumbs mejorados con schema.org -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Inicio",
          "item": "{{ site.url }}"
        },
          {
            "@type": "ListItem",
            "position": 2,
            "name": "{{ page.title }}",
            "item": "{{ site.url }}{{ page.url }}"
          }
      ]
    }
    </script>

    <!-- JSON-LD para marca personal -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Javo",
      "url": "{{ site.url }}",
      "sameAs": [
        "https://www.youtube.com/@Leedeo",
        "https://x.com/leedeostudio",
        "https://bsky.app/profile/leedeo.bsky.social",
        "https://github.com/leedeo"
      ],
      "brand": {
        "@type": "Brand",
        "name": "Leedeo Studio",
        "logo": "{{ '/favicon.ico' | absolute_url }}"
      },
      "hasOccupation": {
        "@type": "Occupation",
        "name": "Desarrollador de Videojuegos"
      }
    }
    </script>
    
    {% if page.video %}
    <!-- esquema: vídeo -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoObject",
      "name": "{{ page.video.title | escape }}",
      "description": "{{ page.video.description | escape }}",
      "thumbnailUrl": "https://i.ytimg.com/vi/{{ page.video.id }}/maxresdefault.jpg",
      "uploadDate": "{{ page.video.upload_date }}T12:00:00+00:00",
      "duration": "{{ page.video.duration }}",
      "contentUrl": "https://www.youtube.com/watch?v={{ page.video.id }}",
      "embedUrl": "https://www.youtube.com/embed/{{ page.video.id }}",
      "publisher": {
        "@type": "Person",
        "name": "Javo",
        "url": "{{ site.url }}/about/"
      }
    }
    </script>
    {% endif %}
</head>

<body class="selection:bg-violet-500/30">
    {% include header.html %}

    <main id="main-content">
        {{ content }}
    </main>

    {% include footer.html %}
    {% include cookie-banner.html %}

    <script src="{{ '/assets/js/scroll-top.js' | relative_url }}" defer></script>
</body>
</html>
