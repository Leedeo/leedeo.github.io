<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    {% include head.html %}

    <!-- datos estructurados: persona (Javo / Leedeo Studio) -->
    {% include schema-person.html %}

    <!-- datos estructurados: vídeo (solo si el post declara `video` en el front matter) -->
    {% include schema-video.html %}

    <!-- migas de pan genéricas para páginas que no son posts -->
    <!-- los posts usan su propio BreadcrumbList de 3 niveles en _layouts/post.html -->
    {% unless page.layout == 'post' %}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Inicio",
          "item": "{{ site.url }}"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "{{ page.title }}",
          "item": "{{ site.url }}{{ page.url }}"
        }
      ]
    }
    </script>
    {% endunless %}
</head>

<body class="selection:bg-violet-500/30">
    {% include header.html %}

    <main id="main-content">
        {{ content }}
    </main>

    {% include footer.html %}
    {% include cookie-banner.html %}

    <script src="{{ '/assets/js/scroll-top.js' | relative_url }}" defer></script>
</body>
</html>
