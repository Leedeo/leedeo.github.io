<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    {% include head.html %}

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Javo",
      "url": "{{ site.url }}/about/",
      "image": "{{ '/assets/img/ui/author-javo.webp' | absolute_url }}",
      "jobTitle": "Desarrollador de Videojuegos Independiente",
      "description": "{{ site.data.authors.javo.bio | escape }}",
      "sameAs": [
        "https://www.youtube.com/@Leedeo",
        "https://x.com/leedeostudio",
        "https://github.com/xavierocampos",
        "https://ko-fi.com/leedeo",
        "https://www.tiktok.com/@leedeostudio",
        "https://www.instagram.com/leedeo/"
      ],
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ site.url }}"
      }
    }
    </script>

    {% if page.video %}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoObject",
      "name": "{{ page.video.title | escape }}",
      "description": "{{ page.video.description | escape }}",
      "thumbnailUrl": "https://i.ytimg.com/vi/{{ page.video.id }}/maxresdefault.jpg",
      "uploadDate": "{{ page.video.upload_date }}T12:00:00+00:00",
      "duration": "{{ page.video.duration }}",
      "contentUrl": "https://www.youtube.com/watch?v={{ page.video.id }}",
      "embedUrl": "https://www.youtube.com/embed/{{ page.video.id }}",
      "publisher": {
        "@type": "Person",
        "name": "Javo",
        "url": "{{ site.url }}/about/"
      }
    }
    </script>
    {% endif %}
</head>

<body class="selection:bg-violet-500/30">

    {% include header.html %}

    <main id="main-content">
        {{ content }}
    </main>
    {% include footer.html %}
    {% include cookie-banner.html %}

</body>

</html>
