title: Leedeo Studio
email: javo@leedeo.net
description: "Leedeo Studio: Tutoriales prácticos de Godot Engine, cursos de desarrollo de videojuegos y herramientas exclusivas de optimización como Leedeo Cleaner."
baseurl: ""
url: "https://leedeo.net"
permalink: /blog/:title/

markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

paginate: 12
paginate_path: "/blog/page:num/"

future: true
timezone: Europe/Madrid

# Disqus Comments
disqus_shortname: "leedeo"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - assets/css/tailwind-input.css
  - _herramientas
  - package.json
  - package-lock.json
  - build-tailwind.sh
  - build-tailwind.bat
