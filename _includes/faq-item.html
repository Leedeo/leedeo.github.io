<details class="static-glass-card rounded-2xl border border-white/5 group" itemscope itemprop="mainEntity" itemtype="https://schema.org/Question">
  <summary class="p-6 cursor-pointer text-white font-bold text-lg flex items-center justify-between gap-4 select-none hover:text-violet-400 transition-colors">
    <span itemprop="name"><i class="fa-solid fa-circle-question"></i> {{ include.question }}</span>
    <i class="fas fa-chevron-down text-violet-400 transition-transform group-open:rotate-180 shrink-0"></i>
  </summary>
  <div class="px-6 pb-6 text-slate-400 leading-relaxed" itemscope itemprop="acceptedAnswer" itemtype="https://schema.org/Answer">
    <div itemprop="text">
      {{ include.answer }}
    </div>
  </div>
</details>
