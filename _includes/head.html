<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
{% seo %}

<!-- Preconectar orígenes clave (reduce latencia de conexión) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link rel="preconnect" href="https://cdn.tailwindcss.com">

<!-- CSS crítico inline: fondo negro inmediato para evitar flash blanco -->
<style>
  :root {
    --bg-dark: #0f0a1d;
    --violet-primary: #8b5cf6;
    --violet-light: #c084fc;
    --pink-accent: #f472b6;
    --text-slate: #f1f5f9;
  }

  *,
  ::before,
  ::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    background-color: var(--bg-dark);
    color: var(--text-slate);
    font-family: system-ui, sans-serif;
    overflow-x: hidden;
  }

  /* Oculta iconos FA hasta que cargue para evitar cuadros □ */
  .fa,
  .fas,
  .far,
  .fab,
  .fa-brands,
  .fa-solid {
    visibility: hidden;
  }
</style>

<!-- Fuentes de Google: SÍNCRONAS con font-display=optional (cero CLS)
     "optional" = si la fuente está lista en los primeros ~100ms, úsala; si no, usa la fuente del sistema SIN 
     hacer swap posterior → nunca hay salto de layout. Con preconnect suele estar lista a tiempo. -->
<link rel="preload"
  href="https://fonts.googleapis.com/css2?family=Pacifico&family=Plus+Jakarta+Sans:wght@200;300;400;600;800&display=optional"
  as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript>
  <link
    href="https://fonts.googleapis.com/css2?family=Pacifico&family=Plus+Jakarta+Sans:wght@200;300;400;600;800&display=optional"
    rel="stylesheet">
</noscript>

<!-- Tailwind CSS: diferido (async) para no bloquear el LCP.
     Tailwind solo afecta utilidades visuales, no el layout de texto → no causa CLS. -->
<script>
  (function () {
    var s = document.createElement('script');
    s.src = 'https://cdn.tailwindcss.com';
    s.async = true;
    document.head.appendChild(s);
  })();
</script>

<!-- Google Analytics: diferido hasta después del evento load -->
<link rel="preconnect" href="https://www.googletagmanager.com">
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag() { dataLayer.push(arguments); }
  window.addEventListener('load', function () {
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id=G-2SB71QMPV3';
    document.head.appendChild(s);
    gtag('js', new Date());
    gtag('config', 'G-2SB71QMPV3');
  });
</script>

<link rel="shortcut icon" href="{{ '/assets/img/favicon.png' | relative_url }}" type="image/png">

<!-- style.css: SÍNCRONO (solo 3KB, ya cacheado en visitas repetidas).
     Hacerlo async causaba CLS por los cambios de glassmorphism/layout. Vale la pena el coste. -->
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

<!-- FontAwesome: asíncrono. Los iconos no afectan layout de texto → no causa CLS. -->
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style"
  onload="this.onload=null;this.rel='stylesheet';document.querySelectorAll('.fa,.fas,.far,.fab,.fa-brands,.fa-solid').forEach(function(el){el.style.visibility='';});">
<noscript>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</noscript>
