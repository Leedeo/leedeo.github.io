<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
{% seo %}

<!-- Preconectar orígenes clave (reduce latencia de primera conexión) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link rel="preconnect" href="https://cdn.tailwindcss.com">

<!-- CSS crítico inline: fondo oscuro instantáneo para evitar flash blanco -->
<style>
  body {
    background-color: #0f0a1d;
  }
</style>

<!-- Tailwind CSS: SÍNCRONO — toda la maquetación depende de él, no se puede diferir -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Fuentes de Google: asíncronas con display=swap (garantiza la carga de los pesos correctos) -->
<link rel="preload"
  href="https://fonts.googleapis.com/css2?family=Pacifico&family=Plus+Jakarta+Sans:wght@200;300;400;600;800&display=swap"
  as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript>
  <link
    href="https://fonts.googleapis.com/css2?family=Pacifico&family=Plus+Jakarta+Sans:wght@200;300;400;600;800&display=swap"
    rel="stylesheet">
</noscript>

<!-- Google Analytics: diferido al evento load para no retrasar el LCP -->
<link rel="preconnect" href="https://www.googletagmanager.com">
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag() { dataLayer.push(arguments); }
  window.addEventListener('load', function () {
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id=G-2SB71QMPV3';
    document.head.appendChild(s);
    gtag('js', new Date());
    gtag('config', 'G-2SB71QMPV3');
  });
</script>

<link rel="shortcut icon" href="{{ '/assets/img/favicon.png' | relative_url }}" type="image/png">

<!-- style.css: SÍNCRONO (3KB — hacerlo async causaba CLS de 0.3 en el layout) -->
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

<!-- FontAwesome: asíncrono (iconos visuales, no afectan layout ni causan CLS) -->
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style"
  onload="this.onload=null;this.rel='stylesheet'">
<noscript>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</noscript>
