<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
{% seo %}

<!-- Preconectar orígenes clave -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com">

<!-- Fuentes de Google optimizadas (Asíncronas para PageSpeed) -->
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Pacifico&family=Plus+Jakarta+Sans:wght@200;300;400;600;800&display=swap"
  media="print" onload="this.media='all'">
<noscript>
  <link
    href="https://fonts.googleapis.com/css2?family=Pacifico&family=Plus+Jakarta+Sans:wght@200;300;400;600;800&display=swap"
    rel="stylesheet">
</noscript>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Global site tag (gtag.js) - Google Analytics -->
<link rel="preconnect" href="https://www.googletagmanager.com">
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag() { dataLayer.push(arguments); }
  // Diferir la configuración de Analytics hasta después del evento load
  window.addEventListener('load', function () {
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id=G-2SB71QMPV3';
    document.head.appendChild(s);
    gtag('js', new Date());
    gtag('config', 'G-2SB71QMPV3');
  });
</script>

<link rel="shortcut icon" href="{{ '/assets/img/favicon.png' | relative_url }}" type="image/png">

<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

<!-- FontAwesome asíncrono para evitar bloqueo de renderizado (Recomendación PageSpeed) -->
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style"
  onload="this.onload=null;this.rel='stylesheet'">
<noscript>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</noscript>
