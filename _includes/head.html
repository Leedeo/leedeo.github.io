<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
{% seo %}

<!-- Content Security Policy
     script-src: sin 'unsafe-inline' (todos los scripts son archivos externos)
     script-src-attr: 'none' (no quedan onclick/onload inline)
     style-src: mantiene 'unsafe-inline' — necesario para atributos style="" de Tailwind e iframes
-->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.tailwindcss.com https://www.googletagmanager.com https://www.google-analytics.com https://leedeo.disqus.com https://a.disquscdn.com; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https://www.google-analytics.com https://referrer.disqus.com https://a.disquscdn.com https://i.ytimg.com; connect-src 'self' https://www.google-analytics.com https://links.services.disqus.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com https://disqus.com; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;">

<!-- Preconectar orígenes clave -->
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link rel="preconnect" href="https://www.youtube.com">
<link rel="dns-prefetch" href="https://www.youtube.com">
<link rel="preconnect" href="https://i.ytimg.com">
<link rel="dns-prefetch" href="https://i.ytimg.com">

<!-- Preload de fuentes críticas -->
<link rel="preload" href="{{ '/assets/fonts/plus-jakarta-sans-latin.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="{{ '/assets/fonts/pacifico-latin.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="{{ '/assets/fonts/fa-solid-900.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>

<!-- Estilos Críticos e Inline de Fuentes -->
<style>
  :root {
    --bg-dark: #0f0a1d;
    --bg-card: rgba(30, 20, 50, 0.7);
    --violet-primary: #8b5cf6;
    --violet-light: #c084fc;
    --pink-accent: #f472b6;
    --text-slate: #f1f5f9;
  }

  @font-face {
    font-family: 'Plus Jakarta Sans';
    font-style: normal;
    font-weight: 200 800;
    font-display: swap;
    src: url('{{ "/assets/fonts/plus-jakarta-sans-latin.woff2" | relative_url }}') format('woff2');
  }

  @font-face {
    font-family: 'Pacifico';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('{{ "/assets/fonts/pacifico-latin.woff2" | relative_url }}') format('woff2');
  }

  body {
    background-color: var(--bg-dark);
    color: var(--text-slate);
    font-family: 'Plus Jakarta Sans', sans-serif;
    margin: 0;
    overflow-x: hidden;
  }
</style>

<!-- Tailwind CSS: CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- CSS Personalizado -->
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

<!-- FontAwesome: Localizado -->
<link rel="stylesheet" href="{{ '/assets/css/fontawesome.min.css' | relative_url }}">

<link rel="shortcut icon" href="{{ '/assets/img/ui/favicon.png' | relative_url }}" type="image/png">

<!-- Google Analytics: diferido al evento load -->
<link rel="preconnect" href="https://www.googletagmanager.com">
<script src="{{ '/assets/js/analytics.js' | relative_url }}" defer></script>
