<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- etiquetas seo generadas por jekyll -->
{% seo %}

{% if page.noindex == true %}
<meta name="robots" content="noindex, follow">
{% endif %}

{% if page.thumbnail and page.image == nil %}
<meta property="og:image" content="{{ page.thumbnail | absolute_url }}">
<meta name="twitter:image" content="{{ page.thumbnail | absolute_url }}">
{% endif %}

<!-- política de seguridad de contenido: solo scripts de dominios autorizados -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://pagead2.googlesyndication.com https://www.googletagmanager.com https://www.google-analytics.com https://fundingchoicesmessages.google.com https://leedeo.disqus.com https://a.disquscdn.com; script-src-attr 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://pagead2.googlesyndication.com https://www.google-analytics.com https://referrer.disqus.com https://a.disquscdn.com https://i.ytimg.com; connect-src 'self' https://pagead2.googlesyndication.com https://www.google-analytics.com https://links.services.disqus.com https://fonts.googleapis.com https://fonts.gstatic.com; frame-src https://fundingchoicesmessages.google.com https://googleads.g.doubleclick.net https://www.youtube.com https://www.youtube-nocookie.com https://disqus.com; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;">

<!-- preconexiones a dominios externos -->
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

{% if page.video %}
<link rel="preconnect" href="https://www.youtube.com">
<link rel="dns-prefetch" href="https://www.youtube.com">
<link rel="preconnect" href="https://i.ytimg.com">
<link rel="dns-prefetch" href="https://i.ytimg.com">
{% endif %}

<!-- hojas de estilo -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/tailwind.min.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<!-- adsense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4585804237331442" crossorigin="anonymous"></script>

<!-- scripts de inicialización y lógica del sitio -->
<script src="{{ '/assets/js/init.js' | relative_url }}"></script>
<script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
<script src="{{ '/assets/js/analytics.js' | relative_url }}" defer></script>

<!-- favicon -->
<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" type="image/x-icon">
<link rel="apple-touch-icon" href="{{ '/apple-touch-icon.png' | relative_url }}">
