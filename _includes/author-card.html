<div class="flex items-center gap-5 p-6 rounded-2xl bg-white/[0.03]">
    <a href="{{ '/about/' | relative_url }}" class="flex-shrink-0">
        <img src="{{ site.author.avatar }}"
             alt="Avatar de {{ site.author.name }}"
             class="w-16 h-16 rounded-full border-2 border-violet-300/70 object-cover transition-transform duration-300 hover:scale-105"
             width="64" height="64" loading="lazy">
    </a>
    <div class="flex-grow min-w-0">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-1">
            <div>
                <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-violet-400">Escrito por</span>
                <a href="{{ '/about/' | relative_url }}" class="ml-2 text-white font-bold text-[11px] uppercase tracking-widest hover:text-violet-400 transition-colors">{{ site.author.name }}</a>
                <span class="ml-2 text-slate-600 text-[10px] font-bold uppercase tracking-widest">{{ site.author.title }}</span>
            </div>
            <div class="flex items-center gap-2">
                <a href="{{ site.author.youtube }}" target="_blank" rel="noopener"
                   class="w-6 h-6 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center text-slate-500 hover:text-red-500 hover:border-red-500/30 transition-all text-[10px]"
                   aria-label="YouTube"><i class="fab fa-youtube"></i></a>
                <a href="{{ site.author.kofi }}" target="_blank" rel="noopener"
                   class="w-6 h-6 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center text-slate-500 hover:text-rose-500 hover:border-rose-500/30 transition-all text-[10px]"
                   aria-label="Ko-fi"><i class="fa-solid fa-coffee"></i></a>
                <a href="{{ site.author.github }}" target="_blank" rel="noopener"
                   class="w-6 h-6 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center text-slate-500 hover:text-white hover:border-white/30 transition-all text-[10px]"
                   aria-label="GitHub"><i class="fab fa-github"></i></a>
                <a href="{{ site.author.whatsapp }}" target="_blank" rel="noopener"
                   class="w-6 h-6 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center text-slate-500 hover:text-green-500 hover:border-green-500/30 transition-all text-[10px]"
                   aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                <a href="https://x.com/{{ site.author.twitter }}" target="_blank" rel="noopener"
                   class="w-6 h-6 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center text-slate-500 hover:text-sky-400 hover:border-sky-400/30 transition-all text-[10px]"
                   aria-label="X"><i class="fab fa-x-twitter"></i></a>
                <a href="{{ site.author.tiktok }}" target="_blank" rel="noopener"
                   class="w-6 h-6 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center text-slate-500 hover:text-white hover:border-white/30 transition-all text-[10px]"
                   aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
        <p class="text-slate-400 text-sm leading-relaxed line-clamp-2">{{ site.author.bio }}</p>
    </div>
</div>
